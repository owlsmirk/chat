<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" role="img" aria-label="Request flow sequence diagram for a single chat turn">
  <title>Request flow — one chat turn, from keystroke to highlight</title>

  <defs>
    <filter id="cardShadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.10"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#0057B8"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#10AA6F"/>
    </marker>
    <marker id="arrSelf" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#5C6470"/>
    </marker>
  </defs>

  <rect width="1200" height="880" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="40" y="50" font-size="24" font-weight="700" fill="#080808" letter-spacing="-0.4">Request flow — one chat turn</text>
  <text x="40" y="74" font-size="12" font-weight="500" fill="#5C6470">From the user's keystroke to the streaming response and on-page highlight</text>
  <line x1="40" y1="92" x2="1160" y2="92" stroke="#E5E9EE"/>

  <!-- Lifeline headers -->
  <g id="actors">
    <g transform="translate(140,120)">
      <rect x="-110" y="0" width="220" height="46" rx="8" fill="#FFFFFF" stroke="#D5DCE3" filter="url(#cardShadow2)"/>
      <text x="0" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#080808" letter-spacing="-0.2">Browser</text>
      <text x="0" y="36" text-anchor="middle" font-size="10" font-weight="500" fill="#5C6470">index.html · chat widget</text>
    </g>
    <g transform="translate(560,120)">
      <rect x="-130" y="0" width="260" height="46" rx="8" fill="#FFFFFF" stroke="#D5DCE3" filter="url(#cardShadow2)"/>
      <text x="0" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#080808" letter-spacing="-0.2">Vercel</text>
      <text x="0" y="36" text-anchor="middle" font-size="10" font-weight="500" fill="#5C6470">api/chat.js · serverless function</text>
    </g>
    <g transform="translate(1000,120)">
      <rect x="-130" y="0" width="260" height="46" rx="8" fill="#FFFFFF" stroke="#D5DCE3" filter="url(#cardShadow2)"/>
      <text x="0" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#080808" letter-spacing="-0.2">Anthropic</text>
      <text x="0" y="36" text-anchor="middle" font-size="10" font-weight="500" fill="#5C6470">Claude Sonnet 4.5</text>
    </g>
  </g>

  <!-- Lifelines (dashed) -->
  <line x1="140" y1="172" x2="140" y2="820" stroke="#D5DCE3" stroke-dasharray="4 4"/>
  <line x1="560" y1="172" x2="560" y2="820" stroke="#D5DCE3" stroke-dasharray="4 4"/>
  <line x1="1000" y1="172" x2="1000" y2="820" stroke="#D5DCE3" stroke-dasharray="4 4"/>

  <!-- ─── Step 1: user input ─── -->
  <g>
    <text x="60" y="200" font-size="10" font-weight="700" fill="#0057B8" letter-spacing="1">1 · INPUT</text>
    <rect x="50" y="206" width="180" height="56" rx="6" fill="#F7F9FC" stroke="#D5DCE3"/>
    <text x="60" y="222" font-size="10" fill="#080808">User types or speaks</text>
    <text x="60" y="236" font-size="9" fill="#5C6470">Web Speech streams interim</text>
    <text x="60" y="248" font-size="9" fill="#5C6470">transcripts into the composer</text>
    <text x="60" y="258" font-size="9" font-weight="600" fill="#0057B8">Enter → ask()</text>
  </g>

  <!-- self-loop: build payload -->
  <g transform="translate(140,290)">
    <path d="M0 0 H 36 V 14 H 0" stroke="#5C6470" stroke-width="1.2" fill="none" marker-end="url(#arrSelf)"/>
    <text x="44" y="4" font-size="10" font-weight="500" fill="#5C6470">buildSystemPrompt(lang)</text>
    <text x="44" y="16" font-size="9" fill="#9CA3AF">core rules + KB + ES rule when active</text>
  </g>

  <!-- ─── Step 2: request to Vercel ─── -->
  <g transform="translate(0,340)">
    <path d="M141 0 H 559" stroke="#0057B8" stroke-width="2" fill="none" marker-end="url(#arr)"/>
    <rect x="156" y="-26" width="388" height="22" rx="4" fill="#0057B8"/>
    <text x="350" y="-10" text-anchor="middle" font-size="11" font-weight="600" fill="white">POST /api/chat  ·  { system, messages }</text>
    <text x="350" y="14" text-anchor="middle" font-size="9" font-weight="500" fill="#5C6470">JSON · Content-Type · CORS preflight cached 24h</text>
  </g>

  <!-- Vercel activation bar -->
  <rect x="554" y="334" width="12" height="200" fill="#0057B8" opacity="0.18" rx="2"/>

  <!-- Vercel internal checks -->
  <g transform="translate(580,360)">
    <rect width="240" height="84" rx="6" fill="#F7F9FC" stroke="#D5DCE3"/>
    <text x="14" y="20" font-size="10" font-weight="700" fill="#0057B8" letter-spacing="1">2 · GATE</text>
    <text x="14" y="38" font-size="10" fill="#080808">▸ CORS origin check</text>
    <text x="14" y="52" font-size="10" fill="#080808">▸ Rate limit: 20/min/IP</text>
    <text x="14" y="66" font-size="10" fill="#080808">▸ Shape: ≤ 50 msgs, ≤ 4000 ch</text>
    <text x="14" y="80" font-size="10" fill="#080808">▸ Add server-side API key</text>
  </g>

  <!-- ─── Step 3: Vercel → Anthropic ─── -->
  <g transform="translate(0,468)">
    <path d="M561 0 H 999" stroke="#0057B8" stroke-width="2" fill="none" marker-end="url(#arr)"/>
    <rect x="576" y="-26" width="408" height="22" rx="4" fill="#0057B8"/>
    <text x="780" y="-10" text-anchor="middle" font-size="11" font-weight="600" fill="white">POST /v1/messages  ·  stream=true</text>
    <text x="780" y="14" text-anchor="middle" font-size="9" font-weight="500" fill="#5C6470">x-api-key  ·  anthropic-version: 2023-06-01</text>
  </g>

  <!-- Anthropic activation bar -->
  <rect x="994" y="462" width="12" height="170" fill="#10AA6F" opacity="0.18" rx="2"/>

  <!-- Anthropic generation -->
  <g transform="translate(780,492)">
    <rect width="240" height="68" rx="6" fill="#F0FAF4" stroke="#B9E4CC"/>
    <text x="14" y="20" font-size="10" font-weight="700" fill="#10AA6F" letter-spacing="1">3 · GENERATE</text>
    <text x="14" y="38" font-size="10" fill="#3A4654">Reads KB + rules</text>
    <text x="14" y="52" font-size="10" fill="#3A4654">Emits text + control tokens</text>
    <text x="14" y="64" font-size="10" fill="#3A4654">Streams SSE deltas</text>
  </g>

  <!-- ─── Step 4: streaming back ─── -->
  <g transform="translate(0,584)">
    <path d="M999 0 H 561" stroke="#10AA6F" stroke-width="2" fill="none" marker-end="url(#arrGreen)"/>
    <rect x="576" y="-26" width="408" height="22" rx="4" fill="#10AA6F"/>
    <text x="780" y="-10" text-anchor="middle" font-size="11" font-weight="600" fill="white">SSE event stream  ·  content_block_delta</text>
    <text x="780" y="14" text-anchor="middle" font-size="9" font-weight="500" fill="#5C6470">Vercel passes through · no buffering · Cache-Control: no-store</text>
  </g>

  <g transform="translate(0,632)">
    <path d="M559 0 H 141" stroke="#10AA6F" stroke-width="2" fill="none" marker-end="url(#arrGreen)"/>
    <rect x="156" y="-26" width="388" height="22" rx="4" fill="#10AA6F"/>
    <text x="350" y="-10" text-anchor="middle" font-size="11" font-weight="600" fill="white">SSE chunks reach the browser, one delta at a time</text>
  </g>

  <!-- ─── Step 5: browser renders ─── -->
  <g transform="translate(20,662)">
    <rect width="380" height="156" rx="8" fill="#F7F9FC" stroke="#D5DCE3"/>
    <text x="14" y="22" font-size="11" font-weight="700" fill="#0057B8" letter-spacing="1">4 · RENDER</text>
    <text x="14" y="42" font-size="10" font-weight="600" fill="#080808">Streamed renderer</text>
    <text x="14" y="56" font-size="9" fill="#5C6470">Strips control tokens from the visible text;</text>
    <text x="14" y="68" font-size="9" fill="#5C6470">appends remaining text into the bubble with a caret.</text>

    <text x="14" y="92" font-size="10" font-weight="600" fill="#080808">Once finalized</text>
    <text x="14" y="106" font-size="9" fill="#5C6470">▸ Citations → inline chip + Sources drawer</text>
    <text x="14" y="118" font-size="9" fill="#5C6470">▸ Actions → CTAs (phone / link / show)</text>
    <text x="14" y="130" font-size="9" fill="#5C6470">▸ Contextual follow-ups picked by KB IDs</text>
    <text x="14" y="142" font-size="9" fill="#5C6470">▸ Caret removed; message persists in history</text>
  </g>

  <!-- ─── Step 6: optional show-me ─── -->
  <g transform="translate(420,662)">
    <rect width="380" height="156" rx="8" fill="#F0FAF4" stroke="#B9E4CC"/>
    <text x="14" y="22" font-size="11" font-weight="700" fill="#10AA6F" letter-spacing="1">5 · ACT  (optional)</text>
    <text x="14" y="42" font-size="10" font-weight="600" fill="#080808">User taps "Show me on this page"</text>
    <text x="14" y="56" font-size="9" fill="#5C6470">Resolves the target ID against the four page anchors</text>
    <text x="14" y="68" font-size="9" fill="#5C6470">(request button, new / returning / referring cards).</text>
    <text x="14" y="80" font-size="9" fill="#5C6470"></text>
    <text x="14" y="92" font-size="10" font-weight="600" fill="#080808">Desktop</text>
    <text x="14" y="106" font-size="9" fill="#5C6470">Page scrolls, target pulses; widget stays open.</text>
    <text x="14" y="124" font-size="10" font-weight="600" fill="#080808">Mobile</text>
    <text x="14" y="138" font-size="9" fill="#5C6470">Widget dismisses, target pulses, "Back to chat"</text>
    <text x="14" y="150" font-size="9" fill="#5C6470">pill reopens the conversation in place.</text>
  </g>

  <g transform="translate(820,662)">
    <rect width="340" height="156" rx="8" fill="#FFFFFF" stroke="#D5DCE3"/>
    <text x="14" y="22" font-size="11" font-weight="700" fill="#080808" letter-spacing="1">DATA SHAPE</text>
    <text x="14" y="44" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#3A4654">{</text>
    <text x="22" y="58" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#3A4654">"system": "<tspan fill="#0057B8">…rules + KB…</tspan>",</text>
    <text x="22" y="72" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#3A4654">"messages": [</text>
    <text x="30" y="86" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#3A4654">{ role: "user",</text>
    <text x="30" y="100" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#3A4654">  content: "..." },</text>
    <text x="30" y="114" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#3A4654">{ role: "assistant",</text>
    <text x="30" y="128" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#3A4654">  content: "..." }</text>
    <text x="22" y="142" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#3A4654">]</text>
    <text x="14" y="156" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#3A4654">}</text>
  </g>

  <!-- Footer -->
  <line x1="40" y1="850" x2="1160" y2="850" stroke="#E5E9EE"/>
  <g transform="translate(40,866)">
    <rect x="0" y="-9" width="14" height="3" fill="#0057B8"/>
    <text x="20" y="-5" font-size="10" font-weight="500" fill="#5C6470">request</text>
    <rect x="100" y="-9" width="14" height="3" fill="#10AA6F"/>
    <text x="120" y="-5" font-size="10" font-weight="500" fill="#5C6470">stream / return</text>
    <text x="1160" y="-5" text-anchor="end" font-size="10" fill="#9CA3AF">v1 · 2025</text>
  </g>
</svg>
