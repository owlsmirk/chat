<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" role="img" aria-label="Mayo Scheduling Assistant — system architecture for engineers">
  <title>Mayo Scheduling Assistant — Architecture</title>

  <defs>
    <linearGradient id="bgClient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F9FC"/>
      <stop offset="100%" stop-color="#EEF3FA"/>
    </linearGradient>
    <linearGradient id="bgEdge3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFBFC"/>
      <stop offset="100%" stop-color="#F0F1F4"/>
    </linearGradient>
    <linearGradient id="bgModel3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F1FB"/>
      <stop offset="100%" stop-color="#DAE7F5"/>
    </linearGradient>
    <marker id="archArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#0057B8"/>
    </marker>
    <marker id="archArrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#10AA6F"/>
    </marker>
    <marker id="archArrDash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#7A8696"/>
    </marker>
  </defs>

  <rect width="1400" height="800" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="40" y="48" font-size="24" font-weight="700" fill="#080808" letter-spacing="-0.4">Mayo Scheduling Assistant — Architecture</text>
  <text x="40" y="72" font-size="12" font-weight="500" fill="#5C6470">Single HTML widget · Vercel proxy · Claude Sonnet 4.6 · KB externalized as JSON</text>
  <line x1="40" y1="92" x2="1360" y2="92" stroke="#E5E9EE"/>

  <!-- ─── CLIENT LAYER ─── -->
  <g transform="translate(40,116)">
    <rect width="1320" height="120" rx="12" fill="url(#bgClient)" stroke="#D5DCE3"/>
    <rect x="0" y="0" width="6" height="120" fill="#0057B8" rx="3"/>
    <text x="22" y="26" font-size="11" font-weight="700" fill="#0057B8" letter-spacing="2">CLIENT · BROWSER</text>
    <text x="22" y="46" font-size="14" font-weight="600" fill="#080808">index.html — one file, zero npm dependencies</text>
    <text x="22" y="64" font-size="11" fill="#5C6470">No KB, no system prompt assembly — clients can't override either.</text>

    <g transform="translate(22,80)">
      <rect width="120" height="22" rx="11" fill="white" stroke="#D5DCE3"/>
      <text x="60" y="15" text-anchor="middle" font-size="10" font-weight="500" fill="#3A4654">Streaming UI</text>
      <rect x="128" y="0" width="118" height="22" rx="11" fill="white" stroke="#D5DCE3"/>
      <text x="187" y="15" text-anchor="middle" font-size="10" font-weight="500" fill="#3A4654">L10N · EN / ES</text>
      <rect x="254" y="0" width="156" height="22" rx="11" fill="white" stroke="#D5DCE3"/>
      <text x="332" y="15" text-anchor="middle" font-size="10" font-weight="500" fill="#3A4654">Voice in · TTS read-aloud</text>
      <rect x="418" y="0" width="148" height="22" rx="11" fill="white" stroke="#D5DCE3"/>
      <text x="492" y="15" text-anchor="middle" font-size="10" font-weight="500" fill="#3A4654">Show-me highlighter</text>
      <rect x="574" y="0" width="148" height="22" rx="11" fill="white" stroke="#D5DCE3"/>
      <text x="648" y="15" text-anchor="middle" font-size="10" font-weight="500" fill="#3A4654">Capability cards</text>
      <rect x="730" y="0" width="116" height="22" rx="11" fill="white" stroke="#D5DCE3"/>
      <text x="788" y="15" text-anchor="middle" font-size="10" font-weight="500" fill="#3A4654">Token parser</text>
      <rect x="854" y="0" width="158" height="22" rx="11" fill="white" stroke="#D5DCE3"/>
      <text x="933" y="15" text-anchor="middle" font-size="10" font-weight="500" fill="#3A4654">Transcript · clipboard / mailto</text>
      <rect x="1020" y="0" width="180" height="22" rx="11" fill="white" stroke="#D5DCE3"/>
      <text x="1110" y="15" text-anchor="middle" font-size="10" font-weight="500" fill="#3A4654">localStorage (lang preference)</text>
    </g>
  </g>

  <!-- request arrow down -->
  <g>
    <path d="M170 240 V 290" stroke="#0057B8" stroke-width="2" fill="none" marker-end="url(#archArr)"/>
    <text x="184" y="266" font-size="11" font-weight="600" fill="#0057B8">POST /api/chat</text>
    <text x="184" y="282" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#5C6470">{ lang, messages }</text>

    <path d="M650 290 V 240" stroke="#10AA6F" stroke-width="2" fill="none" marker-end="url(#archArrGreen)"/>
    <text x="664" y="266" font-size="11" font-weight="600" fill="#10AA6F">SSE stream</text>
    <text x="664" y="282" font-size="10" fill="#5C6470">text deltas + control tokens</text>
  </g>

  <!-- ─── EDGE LAYER ─── -->
  <g transform="translate(40,300)">
    <rect width="1320" height="140" rx="12" fill="url(#bgEdge3)" stroke="#D5DCE3"/>
    <rect x="0" y="0" width="6" height="140" fill="#0057B8" rx="3"/>
    <text x="22" y="26" font-size="11" font-weight="700" fill="#0057B8" letter-spacing="2">EDGE · VERCEL SERVERLESS</text>
    <text x="22" y="46" font-size="14" font-weight="600" fill="#080808">api/chat.js — stateless · Node 18+ · zero dependencies</text>
    <text x="22" y="64" font-size="11" fill="#5C6470">Gates, builds the system prompt server-side, streams SSE through unmodified.</text>

    <!-- pipeline -->
    <g transform="translate(22,80)">
      <rect width="180" height="28" rx="6" fill="white" stroke="#D5DCE3"/>
      <text x="14" y="13" font-size="9" font-weight="700" fill="#0057B8" letter-spacing="0.5">01 · CORS</text>
      <text x="14" y="24" font-size="9" fill="#5C6470">ALLOWED_ORIGINS</text>

      <rect x="192" y="0" width="180" height="28" rx="6" fill="white" stroke="#D5DCE3"/>
      <text x="206" y="13" font-size="9" font-weight="700" fill="#0057B8" letter-spacing="0.5">02 · RATE LIMIT</text>
      <text x="206" y="24" font-size="9" fill="#5C6470">20 req/min/IP, in-memory</text>

      <rect x="384" y="0" width="180" height="28" rx="6" fill="white" stroke="#D5DCE3"/>
      <text x="398" y="13" font-size="9" font-weight="700" fill="#0057B8" letter-spacing="0.5">03 · VALIDATE</text>
      <text x="398" y="24" font-size="9" fill="#5C6470">≤50 msgs · ≤4000 ch each</text>

      <rect x="576" y="0" width="200" height="28" rx="6" fill="white" stroke="#0057B8"/>
      <text x="590" y="13" font-size="9" font-weight="700" fill="#0057B8" letter-spacing="0.5">04 · BUILD PROMPT</text>
      <text x="590" y="24" font-size="9" fill="#5C6470">rules + kb.json + lang rule</text>

      <rect x="788" y="0" width="180" height="28" rx="6" fill="white" stroke="#D5DCE3"/>
      <text x="802" y="13" font-size="9" font-weight="700" fill="#0057B8" letter-spacing="0.5">05 · STREAM</text>
      <text x="802" y="24" font-size="9" fill="#5C6470">SSE passthrough · no-store</text>

      <!-- kb.json side card -->
      <g transform="translate(1004,-4)">
        <rect width="270" height="36" rx="6" fill="white" stroke="#7A8696" stroke-dasharray="4 3"/>
        <path d="M14 12 L20 12 L24 16 L24 28 L14 28 Z" fill="#7A8696"/>
        <text x="34" y="18" font-size="11" font-weight="700" fill="#080808">kb.json</text>
        <text x="34" y="30" font-size="9" fill="#5C6470">18 entries · cached per warm container</text>
      </g>
      <!-- arrow from kb.json into Build prompt -->
      <path d="M1004 8 H 786" stroke="#7A8696" stroke-width="1.2" stroke-dasharray="3 3" fill="none" marker-end="url(#archArrDash)"/>
    </g>
  </g>

  <!-- request arrow down -->
  <g>
    <path d="M170 444 V 494" stroke="#0057B8" stroke-width="2" fill="none" marker-end="url(#archArr)"/>
    <text x="184" y="470" font-size="11" font-weight="600" fill="#0057B8">POST /v1/messages</text>
    <text x="184" y="486" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#5C6470">stream=true · x-api-key</text>

    <path d="M650 494 V 444" stroke="#10AA6F" stroke-width="2" fill="none" marker-end="url(#archArrGreen)"/>
    <text x="664" y="470" font-size="11" font-weight="600" fill="#10AA6F">SSE</text>
    <text x="664" y="486" font-size="10" fill="#5C6470">content_block_delta events</text>
  </g>

  <!-- ─── MODEL LAYER ─── -->
  <g transform="translate(40,504)">
    <rect width="1320" height="140" rx="12" fill="url(#bgModel3)" stroke="#C9D4E2"/>
    <rect x="0" y="0" width="6" height="140" fill="#002443" rx="3"/>
    <text x="22" y="26" font-size="11" font-weight="700" fill="#002443" letter-spacing="2">MODEL · ANTHROPIC API</text>
    <text x="22" y="46" font-size="14" font-weight="600" fill="#080808">Claude Sonnet 4.6 — system prompt server-built per request</text>
    <text x="22" y="64" font-size="11" fill="#3A4654">Guardrails: KB-only · no medical advice · no PHI · no booking · citations enforced.</text>

    <g transform="translate(22,82)">
      <rect width="400" height="44" rx="6" fill="white" stroke="#C9D4E2"/>
      <text x="14" y="18" font-size="11" font-weight="700" fill="#002443" letter-spacing="1">SYSTEM</text>
      <text x="14" y="34" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#3A4654">BASE_RULES + kb.json + SPANISH_RULE?</text>

      <rect x="412" y="0" width="430" height="44" rx="6" fill="white" stroke="#C9D4E2"/>
      <text x="426" y="18" font-size="11" font-weight="700" fill="#002443" letter-spacing="1">RESPONSE</text>
      <text x="426" y="34" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#3A4654">markdown + &lt;&lt;CITATIONS&gt;&gt;[…] + &lt;&lt;ACTION&gt;&gt;{…}</text>

      <rect x="852" y="0" width="424" height="44" rx="6" fill="white" stroke="#C9D4E2"/>
      <text x="866" y="18" font-size="11" font-weight="700" fill="#002443" letter-spacing="1">ACTION TYPES</text>
      <text x="866" y="34" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#3A4654">phone (tel:) · link (new tab) · show (page reacts)</text>
    </g>
  </g>

  <!-- ─── FOOTER · KEY TECHNICAL CHOICES ─── -->
  <line x1="40" y1="668" x2="1360" y2="668" stroke="#E5E9EE"/>
  <text x="40" y="694" font-size="11" font-weight="700" fill="#0057B8" letter-spacing="2">KEY CHOICES</text>

  <g transform="translate(40,710)">
    <text x="0" y="0" font-size="12" font-weight="600" fill="#080808">Stateless edge</text>
    <text x="0" y="16" font-size="11" fill="#5C6470">Per-IP rate limit in-memory · swap Upstash for production</text>
  </g>
  <g transform="translate(700,710)">
    <text x="0" y="0" font-size="12" font-weight="600" fill="#080808">KB hot-reload</text>
    <text x="0" y="16" font-size="11" fill="#5C6470">Edit kb.json, redeploy — no frontend rebuild, no cache</text>
  </g>
  <g transform="translate(40,742)">
    <text x="0" y="0" font-size="12" font-weight="600" fill="#080808">Server-built prompt</text>
    <text x="0" y="16" font-size="11" fill="#5C6470">Rules + KB live on the edge — clients can't read or override</text>
  </g>
  <g transform="translate(700,742)">
    <text x="0" y="0" font-size="12" font-weight="600" fill="#080808">SSE passthrough</text>
    <text x="0" y="16" font-size="11" fill="#5C6470">No buffering · Cache-Control: no-store on every response</text>
  </g>
</svg>
