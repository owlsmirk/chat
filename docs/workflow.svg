<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 880" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" role="img" aria-label="Mayo Scheduling Assistant — request workflow sequence">
  <title>Mayo Scheduling Assistant — Request Workflow</title>

  <defs>
    <filter id="wfShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.10"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="wfArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#0057B8"/>
    </marker>
    <marker id="wfArrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#10AA6F"/>
    </marker>
    <marker id="wfSelf" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#5C6470"/>
    </marker>
  </defs>

  <rect width="1400" height="880" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="40" y="48" font-size="24" font-weight="700" fill="#080808" letter-spacing="-0.4">Mayo Scheduling Assistant — Request Workflow</text>
  <text x="40" y="72" font-size="12" font-weight="500" fill="#5C6470">One chat turn, end-to-end · keystroke → grounded reply → optional in-page action</text>
  <line x1="40" y1="92" x2="1360" y2="92" stroke="#E5E9EE"/>

  <!-- Lifeline headers -->
  <g transform="translate(180,116)">
    <rect x="-130" y="0" width="260" height="46" rx="8" fill="#FFFFFF" stroke="#D5DCE3" filter="url(#wfShadow)"/>
    <text x="0" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#080808" letter-spacing="-0.2">Browser</text>
    <text x="0" y="36" text-anchor="middle" font-size="10" font-weight="500" fill="#5C6470">index.html · chat widget · L10N · TTS</text>
  </g>
  <g transform="translate(680,116)">
    <rect x="-140" y="0" width="280" height="46" rx="8" fill="#FFFFFF" stroke="#D5DCE3" filter="url(#wfShadow)"/>
    <text x="0" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#080808" letter-spacing="-0.2">Vercel</text>
    <text x="0" y="36" text-anchor="middle" font-size="10" font-weight="500" fill="#5C6470">api/chat.js · kb.json · stateless</text>
  </g>
  <g transform="translate(1180,116)">
    <rect x="-130" y="0" width="260" height="46" rx="8" fill="#FFFFFF" stroke="#D5DCE3" filter="url(#wfShadow)"/>
    <text x="0" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#080808" letter-spacing="-0.2">Anthropic</text>
    <text x="0" y="36" text-anchor="middle" font-size="10" font-weight="500" fill="#5C6470">Claude Sonnet 4.6</text>
  </g>

  <!-- Lifelines -->
  <line x1="180" y1="168" x2="180" y2="800" stroke="#D5DCE3" stroke-dasharray="4 4"/>
  <line x1="680" y1="168" x2="680" y2="800" stroke="#D5DCE3" stroke-dasharray="4 4"/>
  <line x1="1180" y1="168" x2="1180" y2="800" stroke="#D5DCE3" stroke-dasharray="4 4"/>

  <!-- ─── 1 · INPUT ─── -->
  <g>
    <text x="60" y="196" font-size="10" font-weight="700" fill="#0057B8" letter-spacing="1">1 · INPUT</text>
    <rect x="50" y="204" width="220" height="62" rx="6" fill="#F7F9FC" stroke="#D5DCE3"/>
    <text x="60" y="222" font-size="11" font-weight="600" fill="#080808">User taps a capability card,</text>
    <text x="60" y="236" font-size="11" font-weight="600" fill="#080808">speaks via mic, or types.</text>
    <text x="60" y="252" font-size="10" fill="#5C6470">Web Speech streams interim text</text>
    <text x="60" y="262" font-size="10" fill="#5C6470">into the composer live.</text>
  </g>

  <!-- self-loop: build payload -->
  <g transform="translate(180,290)">
    <path d="M0 0 H 40 V 16 H 0" stroke="#5C6470" stroke-width="1.2" fill="none" marker-end="url(#wfSelf)"/>
    <text x="48" y="4" font-size="11" font-weight="600" fill="#5C6470">Assemble payload</text>
    <text x="48" y="18" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#9CA3AF">{ lang, messages } — no KB, no system prompt</text>
  </g>

  <!-- ─── 2 · REQUEST ─── -->
  <g transform="translate(0,344)">
    <path d="M181 0 H 679" stroke="#0057B8" stroke-width="2" fill="none" marker-end="url(#wfArr)"/>
    <rect x="196" y="-26" width="468" height="22" rx="4" fill="#0057B8"/>
    <text x="430" y="-10" text-anchor="middle" font-size="11" font-weight="600" fill="white">POST /api/chat  ·  { lang, messages }</text>
    <text x="430" y="14" text-anchor="middle" font-size="10" font-weight="500" fill="#5C6470">JSON · CORS preflight cached · TLS</text>
  </g>

  <!-- Vercel activation bar -->
  <rect x="674" y="338" width="12" height="226" fill="#0057B8" opacity="0.18" rx="2"/>

  <!-- 2 · GATE + BUILD -->
  <g transform="translate(704,364)">
    <text x="0" y="0" font-size="10" font-weight="700" fill="#0057B8" letter-spacing="1">2 · GATE + BUILD</text>
    <rect x="-10" y="8" width="380" height="120" rx="6" fill="#F7F9FC" stroke="#D5DCE3"/>
    <text x="4" y="28" font-size="11" font-weight="600" fill="#080808">Five-step pipeline:</text>
    <text x="4" y="46" font-size="10.5" fill="#3A4654">▸ CORS origin check</text>
    <text x="4" y="62" font-size="10.5" fill="#3A4654">▸ Rate limit — 20 req/min/IP</text>
    <text x="4" y="78" font-size="10.5" fill="#3A4654">▸ Validate shape (≤ 50 msgs · ≤ 4000 ch)</text>
    <text x="4" y="94" font-size="10.5" fill="#3A4654">▸ <tspan font-weight="700" fill="#0057B8">Build system prompt</tspan> from kb.json + lang rule</text>
    <text x="4" y="110" font-size="10.5" fill="#3A4654">▸ Inject server-side API key</text>
  </g>

  <!-- ─── 3 · UPSTREAM ─── -->
  <g transform="translate(0,524)">
    <path d="M681 0 H 1179" stroke="#0057B8" stroke-width="2" fill="none" marker-end="url(#wfArr)"/>
    <rect x="696" y="-26" width="468" height="22" rx="4" fill="#0057B8"/>
    <text x="930" y="-10" text-anchor="middle" font-size="11" font-weight="600" fill="white">POST /v1/messages  ·  stream=true</text>
    <text x="930" y="14" text-anchor="middle" font-size="10" font-weight="500" fill="#5C6470">x-api-key · anthropic-version: 2023-06-01</text>
  </g>

  <!-- Anthropic activation bar -->
  <rect x="1174" y="518" width="12" height="178" fill="#10AA6F" opacity="0.18" rx="2"/>

  <!-- 3 · GENERATE -->
  <g transform="translate(910,548)">
    <text x="0" y="0" font-size="10" font-weight="700" fill="#10AA6F" letter-spacing="1">3 · GENERATE</text>
    <rect x="-10" y="8" width="260" height="76" rx="6" fill="#F0FAF4" stroke="#B9E4CC"/>
    <text x="4" y="28" font-size="11" font-weight="600" fill="#080808">Claude reads the prompt</text>
    <text x="4" y="46" font-size="10.5" fill="#3A4654">▸ Grounded only in kb.json content</text>
    <text x="4" y="62" font-size="10.5" fill="#3A4654">▸ Emits text + control tokens</text>
    <text x="4" y="78" font-size="10.5" fill="#3A4654">▸ Streams SSE deltas as it goes</text>
  </g>

  <!-- ─── 4 · STREAM BACK ─── -->
  <g transform="translate(0,648)">
    <path d="M1179 0 H 681" stroke="#10AA6F" stroke-width="2" fill="none" marker-end="url(#wfArrGreen)"/>
    <rect x="696" y="-26" width="468" height="22" rx="4" fill="#10AA6F"/>
    <text x="930" y="-10" text-anchor="middle" font-size="11" font-weight="600" fill="white">SSE event stream  ·  content_block_delta</text>
    <text x="930" y="14" text-anchor="middle" font-size="10" font-weight="500" fill="#5C6470">Vercel passes through · no buffering</text>
  </g>

  <g transform="translate(0,694)">
    <path d="M679 0 H 181" stroke="#10AA6F" stroke-width="2" fill="none" marker-end="url(#wfArrGreen)"/>
    <rect x="196" y="-26" width="468" height="22" rx="4" fill="#10AA6F"/>
    <text x="430" y="-10" text-anchor="middle" font-size="11" font-weight="600" fill="white">Chunks arrive at the browser, one delta at a time</text>
  </g>

  <!-- ─── 5 · RENDER + ACT ─── -->
  <g transform="translate(20,720)">
    <text x="0" y="14" font-size="10" font-weight="700" fill="#0057B8" letter-spacing="1">4 · RENDER</text>
    <rect x="-10" y="22" width="320" height="70" rx="6" fill="#F7F9FC" stroke="#D5DCE3"/>
    <text x="4" y="40" font-size="10.5" fill="#3A4654">Tokens append into the accented blue</text>
    <text x="4" y="54" font-size="10.5" fill="#3A4654">bubble with a caret. When the stream ends:</text>
    <text x="4" y="70" font-size="10.5" fill="#3A4654">citations → chips · actions → CTAs · follow-ups</text>
    <text x="4" y="84" font-size="10.5" fill="#3A4654">picked by KB ID. Clean text stored in history.</text>
  </g>

  <g transform="translate(360,720)">
    <text x="0" y="14" font-size="10" font-weight="700" fill="#10AA6F" letter-spacing="1">5 · ACT (optional)</text>
    <rect x="-10" y="22" width="320" height="70" rx="6" fill="#F0FAF4" stroke="#B9E4CC"/>
    <text x="4" y="40" font-size="10.5" fill="#3A4654">User taps a CTA:</text>
    <text x="4" y="56" font-size="10.5" fill="#3A4654"><tspan font-weight="600">phone</tspan> → tel: link  ·  <tspan font-weight="600">link</tspan> → new tab</text>
    <text x="4" y="72" font-size="10.5" fill="#3A4654"><tspan font-weight="600">show</tspan> → widget dismisses, page</text>
    <text x="4" y="86" font-size="10.5" fill="#3A4654">target pulses, "Back to chat" pill returns</text>
  </g>

  <g transform="translate(700,720)">
    <text x="0" y="14" font-size="10" font-weight="700" fill="#080808" letter-spacing="1">DATA SHAPE</text>
    <rect x="-10" y="22" width="340" height="70" rx="6" fill="white" stroke="#D5DCE3"/>
    <text x="4" y="40" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#3A4654">request:  { lang, messages }</text>
    <text x="4" y="56" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#3A4654">stream:   text + &lt;&lt;CITATIONS&gt;&gt;[…]</text>
    <text x="4" y="72" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#3A4654">          + &lt;&lt;ACTION&gt;&gt;{ phone | link | show }</text>
    <text x="4" y="86" font-size="10" font-family="ui-monospace, SFMono-Regular, monospace" fill="#3A4654">history:  clean markdown only</text>
  </g>

  <g transform="translate(1050,720)">
    <text x="0" y="14" font-size="10" font-weight="700" fill="#080808" letter-spacing="1">PERF</text>
    <rect x="-10" y="22" width="240" height="70" rx="6" fill="white" stroke="#D5DCE3"/>
    <text x="4" y="40" font-size="10.5" fill="#3A4654">First token: ~ 400 ms</text>
    <text x="4" y="56" font-size="10.5" fill="#3A4654">Full reply: 1 – 3 s typical</text>
    <text x="4" y="72" font-size="10.5" fill="#3A4654">Cache-Control: no-store</text>
    <text x="4" y="86" font-size="10.5" fill="#3A4654">CORS preflight cached 24h</text>
  </g>

  <!-- Footer -->
  <line x1="40" y1="826" x2="1360" y2="826" stroke="#E5E9EE"/>
  <g transform="translate(40,852)">
    <rect x="0" y="-9" width="14" height="3" fill="#0057B8"/>
    <text x="20" y="-5" font-size="10" font-weight="500" fill="#5C6470">request</text>
    <rect x="100" y="-9" width="14" height="3" fill="#10AA6F"/>
    <text x="120" y="-5" font-size="10" font-weight="500" fill="#5C6470">stream / return</text>
    <text x="1360" y="-5" text-anchor="end" font-size="10" font-weight="500" fill="#9CA3AF">Stateless edge · KB hot-reload · streaming SSE · 2026</text>
  </g>
</svg>
